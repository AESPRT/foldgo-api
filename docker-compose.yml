version: '3.8'

services:
  app:
    build: .
    container_name: fold_go_backend
    restart: always
    ports:
      - "3000:3000"
    # FIX: Replaced manual mapping with automatic .env inclusion
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: fold_go_postgres
    restart: always
    environment:
      - POSTGRES_USER=aedev_admin
      - POSTGRES_PASSWORD=admin123 # ALIGNED: Matches your actual .env credentials
      - POSTGRES_DB=fold_and_go_db
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U aedev_admin -d fold_and_go_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
